---
deployment:
  tasks:
    # ─── Install Composer Dependencies (production) ───
    - export DEPLOYPATH=/home/$USER/public_html
    - /opt/cpanel/composer/bin/composer install --no-dev --optimize-autoloader --no-interaction --working-dir=$DEPLOYPATH

    # ─── Copy .env if missing ───
    - cp -n $DEPLOYPATH/.env.example $DEPLOYPATH/.env || true

    # ─── Generate app key if not set ───
    - cd $DEPLOYPATH && php artisan key:generate --force --no-interaction || true

    # ─── Run database migrations ───
    - cd $DEPLOYPATH && php artisan migrate --force --no-interaction

    # ─── Install Node dependencies & build assets ───
    - cd $DEPLOYPATH && npm ci --production=false
    - cd $DEPLOYPATH && npm run build

    # ─── Clear and cache config/routes/views ───
    - cd $DEPLOYPATH && php artisan config:cache
    - cd $DEPLOYPATH && php artisan route:cache
    - cd $DEPLOYPATH && php artisan view:cache

    # ─── Set permissions ───
    - chmod -R 775 $DEPLOYPATH/storage
    - chmod -R 775 $DEPLOYPATH/bootstrap/cache

    # ─── Storage link ───
    - cd $DEPLOYPATH && php artisan storage:link --force || true
